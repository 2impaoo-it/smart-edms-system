services:
  postgres:
    image: postgres:15-alpine
    container_name: emds-microservices-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartedms}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartedms123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartedms-network

  minio:
    image: minio/minio:latest
    container_name: emds-microservices-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - smartedms-network

  mongodb:
    image: mongo:latest
    container_name: emds-microservices-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: smartedms-audit
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - smartedms-network

  core-service:
    build:
      context: ../services/core-service
      dockerfile: Dockerfile
    container_name: smartedms-core-service
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-smartedms}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-smartedms123}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - minio
    networks:
      - smartedms-network

  audit-service:
    build:
      context: ../services/audit-service
      dockerfile: Dockerfile
    container_name: smartedms-audit-service
    restart: always
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/smartedms-audit
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    networks:
      - smartedms-network

  web-portal:
    build:
      context: ../apps/web-portal
      dockerfile: Dockerfile
    container_name: smartedms-web-portal
    restart: always
    ports:
      - "80:80"
    depends_on:
      - core-service
      - audit-service
    networks:
      - smartedms-network

volumes:
  postgres_data:
  minio_data:
  mongodb_data:

networks:
  smartedms-network:
    driver: bridge
