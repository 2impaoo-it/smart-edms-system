# Load file .env
spring.config.import=optional:file:.env[.properties]

# 1. Cấu hình kết nối PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/smartedms
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Cấu hình JPA / Hibernate (Tự động tạo bảng từ code Java) update/create
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. Cấu hình Server Port
server.port=8080
server.address=0.0.0.0

# --- Cấu hình MinIO ---
minio.endpoint=http://localhost:9000
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket=documents

# 4. Swagger/OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# --- Cấu hình JWT ---
# Thời gian hết hạn (86400000 ms = 24 giờ)
jwt.expiration=86400000

# Mật khẩu mặc định do hệ thống gán khi admin tạo tài khoản mới
app.user.default-password=Welcome@123

# Secret Key
jwt.secret=${JWT_SECRET}

# --- Cấu hình Gotenberg (Chuyển đổi Word/Excel sang PDF) ---
gotenberg.url=http://localhost:3001/forms/libreoffice/convert

# --- Cấu hình Audit Service (Node.js) ---
audit-service.url=http://localhost:3000
audit.secret-key=${AUDIT_SECRET_KEY}
