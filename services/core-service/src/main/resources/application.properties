# 1. Cấu hình kết nối PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/smartedms
spring.datasource.username=postgres
spring.datasource.password=smartedms123

spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Cấu hình JPA / Hibernate (Tự động tạo bảng từ code Java) update/create
spring.jpa.hibernate.ddl-auto=create 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. Cấu hình Server Port
server.port=8080
server.address=0.0.0.0

# --- Cấu hình MinIO ---
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=documents

# 4. Swagger/OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# --- Cấu hình JWT ---
# Thời gian hết hạn (86400000 ms = 24 giờ)
jwt.expiration=86400000

# Mật khẩu mặc định do hệ thống gán khi admin tạo tài khoản mới
